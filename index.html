<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

        <title>OCR Reader Pro - Tư Ngữ Audio</title>

        <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	    <link rel="icon" type="image/svg+xml" href="icon.svg">
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="app">
            <div class="topbar">
                <div class="logo-wrap">
                    <div class="logo">🦉</div>
                    <div class="title-wrap">
                        <div class="title">OCR Reader Pro</div>
                        <div class="version">v.24.05.10</div>
                        <div class="tn-badge">Tư Ngữ Audio</div>
                    </div>
                </div>
                <div class="top-actions">
                    <div class="counter" id="counter">0 / 20 ảnh</div>
                    <button class="clear-btn" id="clearBtn">Xóa tất cả</button>
                </div>
            </div>

            <div class="main">
                <div class="sidebar">
                    <div class="sidebar-title">Upload ảnh</div>
                    <div class="sidebar-desc">Kéo thả, paste trực tiếp (Ctrl + V) hoặc tải ảnh lên để nhận diện văn bản.</div>
                    
                    <div class="upload-zone" id="dropZone">
                        <div class="upload-icon">🖼️</div>
                        <div class="upload-title">Drop ảnh vào đây</div>
                        <div class="upload-sub">Hỗ trợ PNG, JPG, WEBP...</div>
                        <label class="upload-button">
                            Chọn ảnh từ máy
                            <input type="file" id="fileInput" accept="image/*" multiple>
                        </label>
                    </div>
                </div>

                <div class="content">
                    <div class="empty" id="empty">
                        <div class="empty-icon">📸</div>
                        <div class="empty-title">Chưa có ảnh nào</div>
                        <div class="empty-sub">Hãy tải ảnh lên hoặc nhấn Ctrl + V để AI bắt đầu quét văn bản ngay nhé.</div>
                    </div>
                    <div class="grid" id="grid"></div>
                </div>
            </div>
        </div>

        <!-- MODAL -->
        <div class="modal" id="modal">
            <div class="modal-box">
                <div class="modal-left">
                    <img id="modalImage" alt="Bản xem trước">
                </div>
                <div class="modal-right">
                    <div class="modal-header">
                        <h2>Kết quả OCR</h2>
                        <button class="close" id="closeModal">✕</button>
                    </div>
                    <div class="modal-text" id="modalText"></div>
                    <div class="modal-actions">
                        <button class="btn copy-btn" id="modalCopy">Copy toàn bộ text</button>
                    </div>
                </div>
            </div>
        </div>

        <script src="main.js"></script>
    </body>
</html>
